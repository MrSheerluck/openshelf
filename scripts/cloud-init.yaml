#cloud-config
# Paste this into DigitalOcean's User Data field (or any Ubuntu VPS startup
# script field) for a one-click install.
#
# Installs Docker, clones OpenShelf, generates a JWT_SECRET, and starts the
# app on port 8080.
#
# After deploy, SSH into the server and:
#   1. Edit /opt/openshelf/.env to set R2/S3 credentials and (optionally) DOMAIN
#   2. cd /opt/openshelf && docker compose up -d
#   3. Open http://<server-ip>:8080 and set your admin password

package_update: true
package_upgrade: true
packages:
  - docker.io
  - docker-compose-v2
  - git

write_files:
  - path: /etc/docker/daemon.json
    content: |
      { "log-driver": "json-file", "log-opts": { "max-size": "10m", "max-file": "3" } }

runcmd:
  - systemctl enable --now docker
  - git clone https://github.com/MrSheerluck/openshelf /opt/openshelf
  - |
    sed "s/JWT_SECRET=.*/JWT_SECRET=$(openssl rand -hex 32)/" \
      /opt/openshelf/.env.example > /opt/openshelf/.env
  - cd /opt/openshelf && docker compose up -d --build
