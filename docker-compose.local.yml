# Local development — includes Garage, backend, and frontend.
# Usage: docker compose -f docker-compose.local.yml up -d

services:
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: openshelf-garage
    ports:
      - "3900:3900"
    volumes:
      - garage_meta:/var/lib/garage/meta
      - garage_data:/var/lib/garage/data
      - ./garage/garage.toml:/etc/garage.toml:ro
    environment:
      - GARAGE_DEFAULT_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GKlocaldev}
      - GARAGE_DEFAULT_SECRET_KEY=${GARAGE_SECRET_KEY:-local-dev-secret-key}
      - GARAGE_DEFAULT_BUCKET=${S3_BUCKET:-openshelf}
    command:
      - /garage
      - server
      - --single-node
      - --default-bucket
    healthcheck:
      test: ["CMD", "/garage", "status"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    ports:
      - "3001:3001"
    environment:
      - JWT_SECRET=${JWT_SECRET:-dev-secret-change-me}
      - DATABASE_PATH=/data/app.db
      - S3_ENDPOINT=http://garage:3900
      - S3_BUCKET=${S3_BUCKET:-openshelf}
      - S3_REGION=garage
      - S3_ACCESS_KEY=${GARAGE_ACCESS_KEY:-GKlocaldev}
      - S3_SECRET_KEY=${GARAGE_SECRET_KEY:-local-dev-secret-key}
      - FRONTEND_URL=http://localhost:3000
    volumes:
      - db_data:/data
    depends_on:
      garage:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:3001
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  garage_meta:
  garage_data:
  db_data:
